name: Meridian.AI for Stocks

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
    inputs:
      epochs:
        description: 'Training epochs'
        required: false
        default: '1'

permissions:
  contents: write
  issues: write
  actions: read

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v2
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Setup & Fetch Stock Data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      has_data: ${{ steps.check_data.outputs.has_data }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install comet-ml

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          df -h

      - name: Fetch Stock Data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "Fetching stock data..."
          python scripts/fetch_and_store_data.py \
            --db-file training.db \
            --asset-type stock \
            --limit 150 || echo "Data fetch completed with warnings"

      - name: Check if Data was Fetched
        id: check_data
        run: |
          if [ -f training.db ]; then
            COUNT=$(sqlite3 training.db "SELECT COUNT(*) FROM market_data;")
            echo "Total rows: $COUNT"
            if [ "$COUNT" -gt "0" ]; then
              echo "has_data=true" >> $GITHUB_OUTPUT
            else
              echo "has_data=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Database
        if: steps.check_data.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: stock-training-db-${{ github.run_number }}
          path: training.db
          retention-days: 1

  train:
    name: Train Stock Model
    needs: setup
    if: needs.setup.outputs.has_data == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 65

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Database
        uses: actions/download-artifact@v4
        with:
          name: stock-training-db-${{ github.run_number }}

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install comet-ml huggingface_hub

      - name: Download Existing Model
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p models
          python -c "
          import os
          from huggingface_hub import hf_hub_download
          try:
              hf_hub_download(repo_id='MeridianAlgo/ARA.AI', filename='models/Meridian.AI_Stocks.pt', local_dir='.', token=os.environ.get('HF_TOKEN'))
              print('Downloaded existing stock model (loader will skip if old version).')
          except Exception as e:
              print(f'No existing model found, will train fresh: {e}')
          "

      - name: Train Model
        env:
          COMET_API_KEY: ${{ secrets.COMET_API_KEY }}
        continue-on-error: false
        run: |
          echo "Training Stock Model on ALL symbols (1 epoch, epoch-based)"

          python scripts/train_stock_model.py \
            --db-file training.db \
            --output models/Meridian.AI_Stocks.pt \
            --use-all-data \
            --epochs 1 \
            --max-time 50 \
            --comet-api-key "$COMET_API_KEY" || echo "Training completed with warnings"

      - name: Upload Model
        uses: actions/upload-artifact@v4
        with:
          name: stock-model-${{ github.run_number }}
          path: models/Meridian.AI_Stocks.pt
          retention-days: 7

  deploy:
    name: Push to Hugging Face
    needs: [train, setup]
    if: needs.setup.outputs.has_data == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install huggingface_hub python-dotenv

      - name: Download Model
        uses: actions/download-artifact@v4
        with:
          name: stock-model-${{ github.run_number }}
          path: models/

      - name: Upload to HF Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        continue-on-error: true
        run: |
          echo "Uploading Stock Model to Hugging Face..."
          python scripts/push_elite_models.py \
            --model-path models/Meridian.AI_Stocks.pt \
            --model-type stock || echo "Upload completed with warnings"

  cleanup:
    name: Cleanup
    needs: [setup, train, deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: stock-training-db-${{ github.run_number }}
        continue-on-error: true

      - name: Create Failure Issue
        if: needs.train.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Stock Training Failed - Run ${context.runNumber}`;
            const body = `## Stock Model Training Failure

            **Workflow:** [Run ${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            **Triggered:** ${context.eventName}
            **Commit:** ${context.sha.substring(0, 7)}

            ### Job Results
            - Setup: ${{ needs.setup.result }}
            - Training: ${{ needs.train.result }}
            - Deploy: ${{ needs.deploy.result }}

            [View Logs](${context.payload.repository.html_url}/actions/runs/${context.runId})
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'stock-training', 'automated']
            });
