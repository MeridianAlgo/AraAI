name: Meridian.AI for Forex

on:
  schedule:
    - cron: '30 * * * *'
  workflow_dispatch:

# Only one forex training run at a time — queued runs wait, never cancel in-progress
concurrency:
  group: forex-training
  cancel-in-progress: false

permissions:
  contents: write
  issues: write

env:
  PYTHON_VERSION: '3.11'
  CACHE_VERSION: v3
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  setup:
    name: Setup & Fetch Forex Data
    runs-on: ubuntu-latest
    outputs:
      has_data: ${{ steps.check_data.outputs.has_data }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Information
        run: |
          echo "=================================================="
          echo "   MERIDIAN.AI  ★  FOREX TRAINING PIPELINE"
          echo "=================================================="
          echo "  Run       : #${{ github.run_number }} (attempt ${{ github.run_attempt }})"
          echo "  Triggered : ${{ github.event_name }}"
          echo "  Commit    : ${{ github.sha }}"
          echo "  Branch    : ${{ github.ref_name }}"
          echo "  Started   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Runner    : ${{ runner.os }} / ${{ runner.arch }}"
          echo "=================================================="
          echo ""
          echo "--- System Resources ---"
          echo "  CPUs  : $(nproc)"
          free -h | awk '/^Mem:/ {printf "  RAM   : %s total, %s available\n", $2, $7}'
          df -h / | awk 'NR==2    {printf "  Disk  : %s free of %s\n", $4, $2}'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache Dependencies
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-

      - name: Install Dependencies
        run: |
          echo "--- Installing dependencies ---"
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install comet-ml
          echo ""
          echo "--- Installed versions ---"
          python --version
          pip show torch pandas numpy comet-ml | grep -E "^(Name|Version):"

      - name: Free Disk Space
        run: |
          echo "--- Disk before cleanup ---"
          df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost
          echo "--- Disk after cleanup ---"
          df -h /

      - name: Fetch Forex Data
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "--- Fetching forex data (up to 30 pairs) ---"
          START=$(date +%s)
          python scripts/fetch_and_store_data.py \
            --db-file training.db \
            --asset-type forex \
            --limit 30
          ELAPSED=$(( $(date +%s) - START ))
          echo "--- Fetch completed in ${ELAPSED}s ---"

      - name: Check if Data was Fetched
        id: check_data
        run: |
          if [ -f training.db ]; then
            COUNT=$(sqlite3 training.db "SELECT COUNT(*) FROM market_data;")
            echo "Total rows in DB: $COUNT"

            if [ "$COUNT" -gt "0" ]; then
              echo "has_data=true" >> $GITHUB_OUTPUT
              echo ""
              echo "=== Database Summary ==="
              sqlite3 -column -header training.db \
                "SELECT asset_type, COUNT(*) as rows, COUNT(DISTINCT symbol) as symbols \
                 FROM market_data GROUP BY asset_type;"

              echo ""
              echo "=== Per-Pair Breakdown (forex) ==="
              sqlite3 -column -header training.db \
                "SELECT symbol,
                        COUNT(*)   AS rows,
                        MIN(date)  AS earliest,
                        MAX(date)  AS latest,
                        CAST(ROUND(JULIANDAY(MAX(date)) - JULIANDAY(MIN(date))) AS INT) AS days_span
                 FROM market_data
                 WHERE asset_type = 'forex'
                 GROUP BY symbol
                 ORDER BY symbol;"
            else
              echo "has_data=false" >> $GITHUB_OUTPUT
              echo "WARNING: Database is empty — skipping training"
            fi
          else
            echo "has_data=false" >> $GITHUB_OUTPUT
            echo "WARNING: training.db not found — skipping training"
          fi

      - name: Upload Database
        if: steps.check_data.outputs.has_data == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: forex-training-db-${{ github.run_number }}
          path: training.db
          retention-days: 1

  train:
    name: Train Forex Model
    needs: setup
    if: needs.setup.outputs.has_data == 'true'
    runs-on: ubuntu-latest
    # 360-min cap (GitHub max for public repos). No per-step timeout on the
    # Train step — only --max-steps 70 governs when training stops; post-training
    # Comet flush + log_model upload + save are given unlimited time to finish.
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: System Resources
        run: |
          echo "=================================================="
          echo "   MERIDIAN.AI  ★  FOREX TRAIN JOB STARTING"
          echo "=================================================="
          echo "  Run     : #${{ github.run_number }}"
          echo "  Started : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""
          echo "--- CPU ---"
          echo "  Cores : $(nproc)"
          cat /proc/cpuinfo | grep "model name" | head -1 | sed 's/model name.*: /  Model : /'
          echo ""
          echo "--- Memory ---"
          free -h
          echo ""
          echo "--- Disk ---"
          df -h /
          echo "=================================================="

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download Database
        uses: actions/download-artifact@v4
        timeout-minutes: 5
        with:
          name: forex-training-db-${{ github.run_number }}

      - name: Database Stats
        run: |
          echo "=== Training Database Loaded ==="
          TOTAL=$(sqlite3 training.db "SELECT COUNT(*) FROM market_data WHERE asset_type='forex';")
          PAIRS=$(sqlite3 training.db "SELECT COUNT(DISTINCT symbol) FROM market_data WHERE asset_type='forex';")
          echo "  Total rows   : $TOTAL"
          echo "  Pairs        : $PAIRS"
          echo "  Avg rows/pair: $(( TOTAL / PAIRS ))"
          echo ""
          echo "--- Per-Pair Detail ---"
          sqlite3 -column -header training.db \
            "SELECT symbol,
                    COUNT(*)   AS rows,
                    MIN(date)  AS earliest,
                    MAX(date)  AS latest
             FROM market_data
             WHERE asset_type = 'forex'
             GROUP BY symbol
             ORDER BY symbol;"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ env.CACHE_VERSION }}-${{ hashFiles('requirements.txt') }}

      - name: Install Dependencies
        timeout-minutes: 8
        run: |
          echo "--- Installing dependencies ---"
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
          pip install comet-ml huggingface_hub
          echo ""
          echo "--- Key package versions ---"
          python --version
          pip show torch comet-ml huggingface-hub pandas numpy | grep -E "^(Name|Version):"

      - name: Download Existing Model
        timeout-minutes: 5
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          mkdir -p models
          python -c "
          import os
          from huggingface_hub import hf_hub_download
          try:
              hf_hub_download(repo_id='meridianal/ARA.AI', filename='models/Meridian.AI_Forex.pt', local_dir='.', token=os.environ.get('HF_TOKEN'))
              print('Downloaded existing forex model (loader will skip if old version).')
          except Exception as e:
              print(f'No existing model found, will train fresh: {e}')
          "

      - name: Existing Model Info
        run: |
          if [ -f models/Meridian.AI_Forex.pt ]; then
            SIZE=$(ls -lh models/Meridian.AI_Forex.pt | awk '{print $5}')
            echo "✓ Existing model: models/Meridian.AI_Forex.pt  ($SIZE)"
            python -c "
          import torch
          try:
              m = torch.load('models/Meridian.AI_Forex.pt', map_location='cpu', weights_only=False)
              print(f'  Architecture : {m.get(\"config\", {}).get(\"version\", \"N/A\")}')
              print(f'  Training date: {m.get(\"training_date\", \"N/A\")}')
              print(f'  Global step  : {m.get(\"global_step\", \"N/A\")}')
              print(f'  Best loss    : {m.get(\"best_loss\", \"N/A\")}')
              print(f'  Accuracy     : {m.get(\"accuracy\", \"N/A\")}')
              sd = m.get('model_state_dict', m.get('state_dict', {}))
              total = sum(v.numel() for v in sd.values()) if sd else 0
              print(f'  Parameters   : {total:,}')
          except Exception as e:
              print(f'  Could not inspect model: {e}')
          " || true
          else
            echo "  No existing model on HF — will train from scratch"
          fi

      - name: Train Model
        # No step timeout — only --max-steps 70 governs when training stops.
        # Post-training validation, model save, and Comet log_model/flush run
        # to completion without being killed.
        env:
          COMET_API_KEY: ${{ secrets.COMET_API_KEY }}
          PYTHONUNBUFFERED: "1"
        run: |
          echo "=================================================="
          echo "   STARTING FOREX MODEL TRAINING"
          echo "   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "   Max steps: 70  |  No time limit"
          echo "=================================================="
          python -u scripts/train_forex_model.py \
            --db-file training.db \
            --output models/Meridian.AI_Forex.pt \
            --use-all-data \
            --epochs 999 \
            --max-steps 70 \
            --comet-api-key "$COMET_API_KEY"
          EXIT_CODE=$?
          echo ""
          echo "=================================================="
          echo "   TRAINING SCRIPT EXITED — code=$EXIT_CODE"
          echo "   $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="
          exit $EXIT_CODE

      - name: Post-Training Model Verification
        if: always()
        run: |
          echo "=== Post-Training Model Check ==="
          if [ -f models/Meridian.AI_Forex.pt ]; then
            SIZE=$(ls -lh models/Meridian.AI_Forex.pt | awk '{print $5}')
            MTIME=$(stat -c '%y' models/Meridian.AI_Forex.pt)
            echo "✓ Model file PRESENT"
            echo "  Path     : models/Meridian.AI_Forex.pt"
            echo "  Size     : $SIZE"
            echo "  Modified : $MTIME"
            echo ""
            python -c "
          import torch
          try:
              m = torch.load('models/Meridian.AI_Forex.pt', map_location='cpu', weights_only=False)
              print(f'  Training date: {m.get(\"training_date\", \"N/A\")}')
              print(f'  Global step  : {m.get(\"global_step\", \"N/A\")}')
              print(f'  Best loss    : {m.get(\"best_loss\", \"N/A\")}')
              print(f'  Accuracy     : {m.get(\"accuracy\", \"N/A\")}')
          except Exception as e:
              print(f'  Could not inspect saved model: {e}')
          " || true
          else
            echo "✗ CRITICAL: Model file NOT found at models/Meridian.AI_Forex.pt"
            echo "  Artifact upload will be skipped — no HF push this run"
          fi
          echo ""
          echo "--- Final disk state ---"
          df -h /
          echo "--- models/ directory ---"
          ls -lh models/ 2>/dev/null || echo "(models/ directory empty or missing)"

      - name: Upload Model
        if: always() && hashFiles('models/Meridian.AI_Forex.pt') != ''
        uses: actions/upload-artifact@v4
        with:
          name: forex-model-${{ github.run_number }}
          path: models/Meridian.AI_Forex.pt
          retention-days: 7

  deploy:
    name: Push to Hugging Face
    needs: [train, setup]
    # Run as long as setup produced data and the train job actually started
    # (even if it ended with cancelled/failure). The training script's signal
    # handler + atomic _save_model writes a valid .pt before exit, so we still
    # want to push the partial-but-improved checkpoint to HF.
    if: |
      always() &&
      needs.setup.outputs.has_data == 'true' &&
      needs.train.result != 'skipped'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy Info
        run: |
          echo "=================================================="
          echo "   MERIDIAN.AI  ★  FOREX DEPLOY JOB"
          echo "=================================================="
          echo "  Run        : #${{ github.run_number }}"
          echo "  Train result: ${{ needs.train.result }}"
          echo "  Started    : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Dependencies
        run: |
          pip install huggingface_hub python-dotenv

      - name: Download Model
        id: download_model
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: forex-model-${{ github.run_number }}
          path: models/

      - name: Model Download Status
        run: |
          echo "--- Artifact download outcome: ${{ steps.download_model.outcome }} ---"
          if [ -f models/Meridian.AI_Forex.pt ]; then
            SIZE=$(ls -lh models/Meridian.AI_Forex.pt | awk '{print $5}')
            echo "✓ Model ready for upload: models/Meridian.AI_Forex.pt ($SIZE)"
          else
            echo "✗ Model file not found after download — HF upload will be skipped"
            ls -la models/ 2>/dev/null || echo "(models/ directory missing)"
          fi

      - name: Upload to HF Hub
        # Only push if the artifact actually arrived. If training got SIGKILLed
        # mid-save the artifact step may have nothing to upload — skip cleanly.
        if: steps.download_model.outcome == 'success' && hashFiles('models/Meridian.AI_Forex.pt') != ''
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          echo "--- Uploading Forex Model to Hugging Face ---"
          SIZE=$(ls -lh models/Meridian.AI_Forex.pt | awk '{print $5}')
          echo "  File  : models/Meridian.AI_Forex.pt ($SIZE)"
          echo "  Repo  : meridianal/ARA.AI"
          echo "  Time  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          START=$(date +%s)
          python scripts/push_elite_models.py \
            --model-path models/Meridian.AI_Forex.pt \
            --model-type forex
          ELAPSED=$(( $(date +%s) - START ))
          echo "--- HF upload completed in ${ELAPSED}s ---"

  cleanup:
    name: Cleanup & Report
    needs: [setup, train, deploy]
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pipeline Summary
        run: |
          echo "=================================================="
          echo "   MERIDIAN.AI  ★  FOREX PIPELINE COMPLETE"
          echo "=================================================="
          echo "  Run    : #${{ github.run_number }}"
          echo "  Setup  : ${{ needs.setup.result }}"
          echo "  Train  : ${{ needs.train.result }}"
          echo "  Deploy : ${{ needs.deploy.result }}"
          echo "  Time   : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "=================================================="

      - name: Delete Artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: forex-training-db-${{ github.run_number }}
        continue-on-error: true

      - name: Close Previous Failure Issues on Success
        if: needs.train.result == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            // Find open automated forex-training issues and close them
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'forex-training,automated',
              state: 'open',
              per_page: 10,
            });
            for (const issue of issues.data) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `Resolved by successful training run [#${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId}).`,
              });
            }

      - name: Create Failure Issue
        if: needs.train.result == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            // Check if an open issue already exists to avoid duplicates
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'forex-training,automated',
              state: 'open',
              per_page: 5,
            });
            if (existing.data.length > 0) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing — run [#${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})\n- Setup: ${{ needs.setup.result }}\n- Training: ${{ needs.train.result }}\n- Deploy: ${{ needs.deploy.result }}`,
              });
              return;
            }

            const title = `Forex Training Failed — Run ${context.runNumber}`;
            const body = `## Forex Model Training Failure

            **Workflow:** [Run #${context.runNumber}](${context.payload.repository.html_url}/actions/runs/${context.runId})
            **Triggered by:** ${context.eventName}
            **Commit:** ${context.sha.substring(0, 7)}

            ### Job Results
            | Job | Result |
            |-----|--------|
            | Setup | ${{ needs.setup.result }} |
            | Training | ${{ needs.train.result }} |
            | Deploy | ${{ needs.deploy.result }} |

            > This issue will auto-close when the next training run succeeds.

            [View Logs](${context.payload.repository.html_url}/actions/runs/${context.runId})
            `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['bug', 'forex-training', 'automated']
            });
